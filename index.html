<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Приложение для изучения китайского языка — иероглифы, пиньинь, тоны, грамматика, SRS повторение."/>
  <title>Chinese Learning App 汉语学习</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f5f0eb; --card:#ffffff; --text:#1a1a2e; --muted:#7c7c8a;
      --line:#e8e0d8; --line-hover:#d4c8bc;
      --primary:#c0392b; --primary-dark:#a93226; --primary-soft:#fdf2f0; --primary-text:#922b21;
      --gold:#d4a017; --gold-soft:#fefce8; --gold-text:#854d0e;
      --green:#15803d; --green-soft:#f0fdf4;
      --shadow:0 1px 3px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.05);
      --shadow-lg:0 4px 6px rgba(0,0,0,.04),0 20px 40px rgba(0,0,0,.08);
      --shadow-sm:0 1px 2px rgba(0,0,0,.05);
      --radius:16px; --radius-sm:12px; --radius-xs:8px;
    }
    [data-theme="dark"]{
      --bg:#12100e; --card:#1c1917; --text:#f5f0eb; --muted:#a8a29e;
      --line:#2d2926; --line-hover:#3d3733;
      --primary:#e05444; --primary-dark:#c0392b; --primary-soft:#2d1a17; --primary-text:#fca5a5;
      --gold:#f59e0b; --gold-soft:#1c1400; --gold-text:#fcd34d;
      --green:#22c55e; --green-soft:#0d2e1a;
      --shadow:0 1px 3px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.25);
      --shadow-lg:0 4px 6px rgba(0,0,0,.25),0 20px 40px rgba(0,0,0,.4);
      --shadow-sm:0 1px 2px rgba(0,0,0,.2);
    }
    [data-theme="dark"] input,[data-theme="dark"] textarea,[data-theme="dark"] select{background:var(--card);color:var(--text);border-color:var(--line)}
    [data-theme="dark"] .btn.secondary{background:var(--card);color:var(--text)}
    [data-theme="dark"] .word-card,[data-theme="dark"] .item-card,[data-theme="dark"] .resource-card{background:var(--card)}
    [data-theme="dark"] .notice{background:var(--primary-soft);border-color:#4a1a17;color:var(--primary-text)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter','Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.55;-webkit-font-smoothing:antialiased}
    .container{max-width:1280px;margin:0 auto;padding:20px}
    .hero{
      background:linear-gradient(135deg,#8b0000 0%,#c0392b 40%,#d4a017 100%);
      border-radius:var(--radius);padding:28px 32px;margin-bottom:20px;
      color:#fff;position:relative;overflow:hidden;
      box-shadow:0 4px 24px rgba(192,57,43,.3);
    }
    .hero::before{content:"";position:absolute;top:-20%;right:5%;width:300px;height:300px;background:radial-gradient(circle,rgba(255,255,255,.1),transparent 70%);pointer-events:none}
    .hero-char{position:absolute;right:32px;top:50%;transform:translateY(-50%);font-size:96px;opacity:.12;line-height:1;font-weight:900;pointer-events:none}
    .hero *{position:relative;z-index:1}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;transition:box-shadow .2s,border-color .2s}
    .card:hover{box-shadow:var(--shadow-lg);border-color:var(--line-hover)}
    h1{margin:0 0 8px;font-size:clamp(22px,3vw,32px);font-weight:900;line-height:1.15;letter-spacing:-.025em}
    h3{margin:0;letter-spacing:-.02em}
    .hero-muted{color:rgba(255,255,255,.85);font-size:14px;line-height:1.6}
    .badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .badge{display:inline-flex;align-items:center;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;backdrop-filter:blur(8px)}
    .tabs{display:flex;gap:4px;flex-wrap:wrap;margin:0 0 20px;background:var(--card);padding:6px;border-radius:var(--radius);border:1px solid var(--line);box-shadow:var(--shadow-sm)}
    .tab{border:none;background:transparent;border-radius:var(--radius-sm);padding:9px 15px;cursor:pointer;font-weight:700;font-size:13px;color:var(--muted);transition:all .18s;font-family:inherit}
    .tab:hover{background:var(--bg);color:var(--text)}
    .tab.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(192,57,43,.3)}
    .tab-pane{display:none}
    .tab-pane.active{display:block;animation:fadeSlide .22s ease}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    .grid-2{display:grid;grid-template-columns:1fr 1.4fr;gap:16px}
    .grid-2-equal{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .metric .label{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
    .metric .value{font-size:32px;font-weight:900;margin:10px 0 4px;letter-spacing:-.02em}
    .progress{height:8px;background:var(--bg);border-radius:999px;overflow:hidden;margin-top:10px}
    .bar{height:100%;background:linear-gradient(90deg,var(--primary),var(--gold));border-radius:999px;transition:width .4s}
    label{display:block;font-size:12px;font-weight:600;margin-bottom:6px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
    input,textarea,select{width:100%;padding:10px 13px;border-radius:var(--radius-xs);border:1.5px solid var(--line);background:var(--card);font:inherit;font-size:14px;color:var(--text);transition:border-color .15s,box-shadow .15s}
    input:focus,textarea:focus,select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(192,57,43,.12)}
    textarea{min-height:80px;resize:vertical}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;background:var(--primary);color:#fff;font-weight:700;font-size:14px;padding:10px 18px;border-radius:var(--radius-xs);cursor:pointer;transition:all .15s;box-shadow:0 1px 3px rgba(192,57,43,.2);font-family:inherit}
    .btn:hover{background:var(--primary-dark);box-shadow:0 4px 12px rgba(192,57,43,.25);transform:translateY(-1px)}
    .btn:active{transform:translateY(0)}
    .btn.secondary{background:var(--card);color:var(--text);border:1.5px solid var(--line);box-shadow:var(--shadow-sm)}
    .btn.secondary:hover{background:var(--bg);border-color:var(--line-hover)}
    .btn.soft{background:var(--primary-soft);color:var(--primary-text);box-shadow:none}
    .btn.gold{background:var(--gold);color:#fff;box-shadow:0 1px 3px rgba(212,160,23,.3)}
    .btn.gold:hover{background:#b8860b}
    .btn.small{padding:6px 12px;font-size:12px}
    .btn.danger{background:#fef2f2;color:#dc2626;border:1.5px solid #fecaca;box-shadow:none}
    .section-title{margin:0 0 16px;font-size:17px;font-weight:800;letter-spacing:-.015em}
    .list{display:flex;flex-direction:column;gap:10px}
    .word-card,.item-card,.resource-card{border:1px solid var(--line);border-radius:var(--radius-sm);padding:15px;background:var(--card);transition:all .15s}
    .item-card:hover,.word-card:hover{border-color:var(--line-hover);box-shadow:var(--shadow)}
    .chips{display:flex;gap:6px;flex-wrap:wrap}
    .chip,.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;border:1px solid var(--line);background:var(--bg);color:var(--muted)}
    .button-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .small-muted{font-size:13px;color:var(--muted)}
    .notice{padding:13px 15px;border:1px solid #fca5a5;background:var(--primary-soft);border-radius:var(--radius-sm);font-size:13px;color:var(--primary-text);line-height:1.5}
    .notice.gold{border-color:#fcd34d;background:var(--gold-soft);color:var(--gold-text)}
    .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    .mini-box{padding:14px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--card);font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
    .mini-box strong{display:block;font-size:24px;margin-top:6px;color:var(--text);letter-spacing:-.02em;font-weight:900}

    /* Chinese specific */
    .hanzi{font-size:52px;font-weight:900;line-height:1.1;color:var(--primary);letter-spacing:.05em}
    .hanzi-large{font-size:80px;font-weight:900;line-height:1;color:var(--primary);letter-spacing:.05em}
    .pinyin{font-size:18px;font-weight:700;color:var(--gold);letter-spacing:.05em}
    .pinyin-sm{font-size:14px;font-weight:700;color:var(--gold)}
    .tone-1{color:#2563eb} /* flat ā */
    .tone-2{color:#16a34a} /* rising á */
    .tone-3{color:#d97706} /* dipping ǎ */
    .tone-4{color:#dc2626} /* falling à */
    .tone-5{color:var(--muted)} /* neutral a */
    .tone-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:900;color:#fff}
    .t1{background:#2563eb}.t2{background:#16a34a}.t3{background:#d97706}.t4{background:#dc2626}.t5{background:var(--muted)}
    .stroke-order{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .flash-hanzi{font-size:72px;font-weight:900;line-height:1;background:linear-gradient(135deg,var(--primary),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.05em}
    .review-card{min-height:300px;display:flex;flex-direction:column;justify-content:space-between;border:1.5px solid var(--line);border-radius:var(--radius);padding:26px;background:linear-gradient(180deg,var(--card),var(--bg));box-shadow:var(--shadow)}
    .grammar-grid{display:grid;grid-template-columns:240px 1fr;gap:16px;align-items:start}
    .grammar-nav{display:flex;flex-direction:column;gap:4px}
    .grammar-nav-item{padding:9px 13px;border-radius:var(--radius-xs);border:none;background:transparent;cursor:pointer;font:inherit;font-size:13px;font-weight:600;color:var(--muted);text-align:left;transition:all .15s}
    .grammar-nav-item:hover{background:var(--bg);color:var(--text)}
    .grammar-nav-item.active{background:var(--primary-soft);color:var(--primary-text)}
    .grammar-nav-cat{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:10px 13px 4px}
    .grammar-content{display:none}
    .grammar-content.active{display:block;animation:fadeSlide .2s ease}
    .rule-block{border:1px solid var(--line);border-radius:var(--radius-sm);padding:16px;background:var(--card);margin-bottom:12px}
    .rule-block h4{font-size:14px;font-weight:800;margin-bottom:10px}
    .rule-block p{font-size:14px;line-height:1.7;color:var(--text);margin-bottom:8px}
    .rule-formula{background:var(--bg);border:1px solid var(--line);border-radius:var(--radius-xs);padding:10px 14px;font-size:13px;font-weight:700;font-family:'Courier New',monospace;margin:8px 0}
    .rule-example{background:var(--primary-soft);border:1px solid #fca5a5;border-radius:var(--radius-xs);padding:10px 14px;font-size:14px;margin-top:8px;line-height:1.8}
    .rule-example .ch{font-size:18px;font-weight:800;color:var(--primary)}
    .rule-example .py{font-size:13px;color:var(--gold);font-weight:700}
    .rule-example .ru{font-size:13px;color:var(--muted)}
    .theme-toggle{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:var(--radius-xs);padding:7px 14px;cursor:pointer;font:inherit;font-size:13px;font-weight:700;backdrop-filter:blur(8px);transition:all .15s}
    .theme-toggle:hover{background:rgba(255,255,255,.25)}
    .verb-table{width:100%;border-collapse:collapse;font-size:13px}
    .verb-table th{background:var(--bg);border:1px solid var(--line);padding:9px 12px;font-weight:700;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;text-align:left}
    .verb-table td{border:1px solid var(--line);padding:9px 12px;transition:background .1s}
    .verb-table tr:hover td{background:var(--primary-soft)}
    .table-wrapper{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--line)}
    @keyframes fadeSlide{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
    @media(max-width:980px){
      .container{padding:12px}
      .grid-3,.kpis{grid-template-columns:1fr}
      .grid-2,.grid-2-equal{grid-template-columns:1fr}
      .grammar-grid{grid-template-columns:1fr}
      h1{font-size:22px}
      .tabs{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none}
      .tabs::-webkit-scrollbar{display:none}
      .tab{padding:8px 12px;white-space:nowrap}
    }
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none !important;transition:none !important}}
  </style>
</head>
<body>
<div class="container">
  <section class="hero">
    <div class="hero-char">汉</div>
    <div style="display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap">
      <div>
        <h1>Chinese Learning System 汉语学习</h1>
        <div class="hero-muted">Иероглифы, пиньинь, тоны, словарь HSK, грамматика, SRS-повторение и разговорные фразы.</div>
        <div class="badges">
          <span class="badge">HSK 1 → HSK 3</span>
          <span class="badge">普通话 Мандаринский</span>
          <span class="badge">С нуля</span>
        </div>
      </div>
      <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙 Тёмная</button>
    </div>
  </section>

  <div class="tabs" id="tabs"></div>
  <section id="dashboard" class="tab-pane active"></section>
  <section id="tones" class="tab-pane"></section>
  <section id="dictionary" class="tab-pane"></section>
  <section id="review" class="tab-pane"></section>
  <section id="quiz" class="tab-pane"></section>
  <section id="grammar" class="tab-pane"></section>
  <section id="phrases" class="tab-pane"></section>
  <section id="measure" class="tab-pane"></section>
  <section id="radicals" class="tab-pane"></section>
  <section id="reading" class="tab-pane"></section>
  <section id="hanzi" class="tab-pane"></section>
</div>

<script>
const STORAGE = {
  dictionary: 'zh_dictionary_v1',
  tracker: 'zh_tracker_v1',
  settings: 'zh_settings_v1',
};

const defaultSettings = { weeklyWordsGoal: 50, weeklyPracticeGoal: 60 };

// ── Starter words (HSK 1-2 core) ──────────────────────────────
const starterWords = [
  // Приветствия и базовые фразы
  {hanzi:"你好",pinyin:"nǐ hǎo",tone:"3-3",translation:"Привет; Здравствуйте",example:"你好！很高兴认识你。",examplePinyin:"Nǐ hǎo! Hěn gāoxìng rènshi nǐ.",exampleTranslation:"Привет! Рад познакомиться.",category:"👋 Приветствия",hsk:1},
  {hanzi:"谢谢",pinyin:"xiè xie",tone:"4-5",translation:"Спасибо",example:"谢谢你的帮助。",examplePinyin:"Xièxie nǐ de bāngzhù.",exampleTranslation:"Спасибо за вашу помощь.",category:"👋 Приветствия",hsk:1},
  {hanzi:"再见",pinyin:"zài jiàn",tone:"4-4",translation:"До свидания",example:"明天见，再见！",examplePinyin:"Míngtiān jiàn, zàijiàn!",exampleTranslation:"До встречи завтра, пока!",category:"👋 Приветствия",hsk:1},
  {hanzi:"对不起",pinyin:"duì bu qǐ",tone:"4-5-3",translation:"Извините; Прошу прощения",example:"对不起，我来晚了。",examplePinyin:"Duìbuqǐ, wǒ lái wǎn le.",exampleTranslation:"Извините, я опоздал.",category:"👋 Приветствия",hsk:1},
  {hanzi:"没关系",pinyin:"méi guān xi",tone:"2-1-5",translation:"Ничего; Всё в порядке",example:"没关系，不用担心。",examplePinyin:"Méi guānxi, bú yòng dānxīn.",exampleTranslation:"Ничего, не беспокойтесь.",category:"👋 Приветствия",hsk:1},
  {hanzi:"请问",pinyin:"qǐng wèn",tone:"3-4",translation:"Позвольте спросить; Скажите пожалуйста",example:"请问，洗手间在哪里？",examplePinyin:"Qǐngwèn, xǐshǒujiān zài nǎlǐ?",exampleTranslation:"Скажите пожалуйста, где туалет?",category:"👋 Приветствия",hsk:1},

  // Местоимения
  {hanzi:"我",pinyin:"wǒ",tone:"3",translation:"Я",example:"我是俄罗斯人。",examplePinyin:"Wǒ shì Éluósī rén.",exampleTranslation:"Я русский.",category:"👤 Местоимения",hsk:1},
  {hanzi:"你",pinyin:"nǐ",tone:"3",translation:"Ты",example:"你叫什么名字？",examplePinyin:"Nǐ jiào shénme míngzi?",exampleTranslation:"Как тебя зовут?",category:"👤 Местоимения",hsk:1},
  {hanzi:"他",pinyin:"tā",tone:"1",translation:"Он",example:"他是我的朋友。",examplePinyin:"Tā shì wǒ de péngyou.",exampleTranslation:"Он мой друг.",category:"👤 Местоимения",hsk:1},
  {hanzi:"她",pinyin:"tā",tone:"1",translation:"Она",example:"她在哪里工作？",examplePinyin:"Tā zài nǎlǐ gōngzuò?",exampleTranslation:"Где она работает?",category:"👤 Местоимения",hsk:1},
  {hanzi:"我们",pinyin:"wǒ men",tone:"3-5",translation:"Мы",example:"我们是好朋友。",examplePinyin:"Wǒmen shì hǎo péngyou.",exampleTranslation:"Мы хорошие друзья.",category:"👤 Местоимения",hsk:1},
  {hanzi:"他们",pinyin:"tā men",tone:"1-5",translation:"Они",example:"他们都说中文。",examplePinyin:"Tāmen dōu shuō Zhōngwén.",exampleTranslation:"Они все говорят по-китайски.",category:"👤 Местоимения",hsk:1},

  // Числа
  {hanzi:"一",pinyin:"yī",tone:"1",translation:"Один (1)",example:"我有一个苹果。",examplePinyin:"Wǒ yǒu yī ge píngguǒ.",exampleTranslation:"У меня есть одно яблоко.",category:"🔢 Числа",hsk:1},
  {hanzi:"二",pinyin:"èr",tone:"4",translation:"Два (2)",example:"我有两个孩子。",examplePinyin:"Wǒ yǒu liǎng ge háizi.",exampleTranslation:"У меня двое детей.",category:"🔢 Числа",hsk:1},
  {hanzi:"三",pinyin:"sān",tone:"1",translation:"Три (3)",example:"我们需要三个人。",examplePinyin:"Wǒmen xūyào sān ge rén.",exampleTranslation:"Нам нужно три человека.",category:"🔢 Числа",hsk:1},
  {hanzi:"四",pinyin:"sì",tone:"4",translation:"Четыре (4)",example:"今天是四月四号。",examplePinyin:"Jīntiān shì sì yuè sì hào.",exampleTranslation:"Сегодня четвёртое апреля.",category:"🔢 Числа",hsk:1},
  {hanzi:"五",pinyin:"wǔ",tone:"3",translation:"Пять (5)",example:"我工作了五年。",examplePinyin:"Wǒ gōngzuò le wǔ nián.",exampleTranslation:"Я работаю уже пять лет.",category:"🔢 Числа",hsk:1},
  {hanzi:"十",pinyin:"shí",tone:"2",translation:"Десять (10)",example:"我有十块钱。",examplePinyin:"Wǒ yǒu shí kuài qián.",exampleTranslation:"У меня есть десять юаней.",category:"🔢 Числа",hsk:1},
  {hanzi:"百",pinyin:"bǎi",tone:"3",translation:"Сто (100)",example:"这个东西要一百元。",examplePinyin:"Zhège dōngxi yào yī bǎi yuán.",exampleTranslation:"Эта вещь стоит сто юаней.",category:"🔢 Числа",hsk:1},
  {hanzi:"千",pinyin:"qiān",tone:"1",translation:"Тысяча (1000)",example:"这件衣服要两千元。",examplePinyin:"Zhè jiàn yīfu yào liǎng qiān yuán.",exampleTranslation:"Эта одежда стоит две тысячи юаней.",category:"🔢 Числа",hsk:2},

  // Время
  {hanzi:"今天",pinyin:"jīn tiān",tone:"1-1",translation:"Сегодня",example:"今天天气很好。",examplePinyin:"Jīntiān tiānqì hěn hǎo.",exampleTranslation:"Сегодня хорошая погода.",category:"📅 Время",hsk:1},
  {hanzi:"明天",pinyin:"míng tiān",tone:"2-1",translation:"Завтра",example:"我明天有会议。",examplePinyin:"Wǒ míngtiān yǒu huìyì.",exampleTranslation:"Завтра у меня совещание.",category:"📅 Время",hsk:1},
  {hanzi:"昨天",pinyin:"zuó tiān",tone:"2-1",translation:"Вчера",example:"昨天我去了北京。",examplePinyin:"Zuótiān wǒ qù le Běijīng.",exampleTranslation:"Вчера я ездил в Пекин.",category:"📅 Время",hsk:1},

const grammarData = [
  {id:'word-order', category:'Основы', title:'Порядок слов',
   content:`<div class="rule-block"><h4>Базовая структура предложения</h4><p>Китайский — язык с жёстким порядком слов: Подлежащее + Сказуемое + Дополнение. В отличие от русского, порядок нельзя менять произвольно.</p><div class="rule-formula">主语 (Подлежащее) + 谓语 (Сказуемое) + 宾语 (Дополнение)</div><div class="rule-example"><div class="ch">我 爱 中国。</div><div class="py">Wǒ ài Zhōngguó.</div><div class="ru">Я люблю Китай.</div></div><div class="rule-example"><div class="ch">他 吃 饭。</div><div class="py">Tā chī fàn.</div><div class="ru">Он ест рис.</div></div></div><div class="rule-block"><h4>Место обстоятельств времени и места</h4><p>Обстоятельства времени и места ставятся ПЕРЕД сказуемым, а не после, как в русском.</p><div class="rule-example"><div class="ch">我 今天 在北京 工作。</div><div class="py">Wǒ jīntiān zài Běijīng gōngzuò.</div><div class="ru">Я сегодня работаю в Пекине.</div></div></div>`},
  {id:'ma-question', category:'Основы', title:'Вопрос с 吗 (ma)',
   content:`<div class="rule-block"><h4>Самый простой способ задать вопрос</h4><p>Добавь частицу 吗 (ma) в конец утвердительного предложения — и оно превращается в вопрос. Никаких изменений порядка слов!</p><div class="rule-formula">Утвердительное предложение + 吗？</div><div class="rule-example"><div class="ch">你是俄罗斯人。→ 你是俄罗斯人吗？</div><div class="py">Nǐ shì Éluósī rén. → Nǐ shì Éluósī rén ma?</div><div class="ru">Ты русский. → Ты русский?</div></div><div class="rule-example"><div class="ch">你喜欢喝茶吗？</div><div class="py">Nǐ xǐhuān hē chá ma?</div><div class="ru">Тебе нравится пить чай?</div></div></div>`},
  {id:'negation', category:'Основы', title:'Отрицание 不 и 没',
   content:`<div class="rule-block"><h4>不 (bù) — общее отрицание</h4><p>Ставится перед глаголом или прилагательным. Используется для настоящего/будущего и постоянных характеристик.</p><div class="rule-example"><div class="ch">我不是老师。</div><div class="py">Wǒ bù shì lǎoshī.</div><div class="ru">Я не учитель.</div></div><div class="rule-example"><div class="ch">他不喜欢吃辣的。</div><div class="py">Tā bù xǐhuān chī là de.</div><div class="ru">Ему не нравится есть острое.</div></div></div><div class="rule-block"><h4>没 (méi) — отрицание действия в прошлом</h4><p>Используется с глаголом 有 (иметь) и для отрицания завершённых действий.</p><div class="rule-example"><div class="ch">我没有时间。</div><div class="py">Wǒ méiyǒu shíjiān.</div><div class="ru">У меня нет времени.</div></div><div class="rule-example"><div class="ch">我昨天没去。</div><div class="py">Wǒ zuótiān méi qù.</div><div class="ru">Вчера я не ходил.</div></div></div>`},
  {id:'de-particle', category:'Основы', title:'Частица 的 (de)',
   content:`<div class="rule-block"><h4>的 — притяжательность и определение</h4><p>Соединяет определение с определяемым словом. Аналог русского «-ого/-ый» или апострофа в английском.</p><div class="rule-formula">Определение + 的 + Существительное</div><div class="rule-example"><div class="ch">我的朋友</div><div class="py">wǒ de péngyou</div><div class="ru">мой друг</div></div><div class="rule-example"><div class="ch">中国的产品质量很好。</div><div class="py">Zhōngguó de chǎnpǐn zhìliàng hěn hǎo.</div><div class="ru">Качество китайских товаров очень хорошее.</div></div></div>`},
  {id:'hěn', category:'Основы', title:'Усилитель 很 (hěn)',
   content:`<div class="rule-block"><h4>很 обязательно при прилагательных-сказуемых</h4><p>В китайском прилагательное не может быть сказуемым само по себе — нужна «пустая» связка 很. Здесь 很 не значит «очень», это грамматическая норма.</p><div class="rule-formula">主语 + 很 + 形容词</div><div class="rule-example"><div class="ch">这个产品很好。</div><div class="py">Zhège chǎnpǐn hěn hǎo.</div><div class="ru">Этот товар (очень) хороший. [не «очень», просто норма]</div></div><div class="rule-example"><div class="ch">价格很贵。</div><div class="py">Jiàgé hěn guì.</div><div class="ru">Цена высокая.</div></div></div>`},

  {id:'guo-particle', category:'Аспекты', title:'Частица 过 (guò)',
   content:`<div class="rule-block"><h4>过 — опыт в прошлом</h4><p>Показывает, что действие происходило хоть раз в жизни. Аналог "have been/done" в английском Present Perfect.</p><div class="rule-formula">Глагол + 过 + Дополнение</div><div class="rule-example"><div class="ch">你去过中国吗？</div><div class="py">Nǐ qù guò Zhōngguó ma?</div><div class="ru">Ты был в Китае? (когда-нибудь)</div></div><div class="rule-example"><div class="ch">我没学过中文。</div><div class="py">Wǒ méi xué guò Zhōngwén.</div><div class="ru">Я никогда не учил китайский.</div></div></div>`},

// ── Helpers ────────────────────────────────────────────────────
function todayISO(){ return new Date().toISOString().slice(0,10); }
function load(key, fallback){ try{ const r=localStorage.getItem(key); return r?JSON.parse(r):fallback; }catch(e){ return fallback; } }
function save(key, val){ localStorage.setItem(key, JSON.stringify(val)); }
function normalizeDictionary(arr){
  return arr.map(x=>({status:'новое',reviewToday:false,addedAt:todayISO(),srsInterval:1,srsEaseFactor:2.5,srsRepetitions:0,srsDueDate:todayISO(),...x}));
}
function esc(s){ return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function safeJson(s){ return esc(JSON.stringify(s)); }
function percent(a,b){ return Math.min(100,Math.round((a/Math.max(1,b))*100)); }

function srsDueToday(){ return state.dictionary.filter(w=>!w.srsDueDate||w.srsDueDate<=todayISO()); }
function streakCount(){
  if(!state.tracker.length) return 0;
  const dates=[...new Set(state.tracker.map(x=>x.date))].sort((a,b)=>b.localeCompare(a));
  let streak=0,expected=todayISO();
  for(const d of dates){
    if(d===expected){streak++;const dt=new Date(expected);dt.setDate(dt.getDate()-1);expected=dt.toISOString().slice(0,10);}
    else if(d<expected) break;
  }
  return streak;
}

// TTS — optimised for Yandex Browser on Android Xiaomi
let _ttsVoices = [];
let _ttsReady = false;

function _initTTS(){
  if(!('speechSynthesis' in window)) return;
  function load(){
    const v = window.speechSynthesis.getVoices();
    if(v && v.length){ _ttsVoices = v; _ttsReady = true; }
  }
  load();
  window.speechSynthesis.onvoiceschanged = load;
  // Яндекс Браузер иногда требует явного вызова после задержки
  setTimeout(load, 500);
  setTimeout(load, 1500);
}
_initTTS();

function speakChinese(text){
  if(!text) return;

  // Метод 1: Web Speech API с китайским голосом
  if('speechSynthesis' in window){
    const voices = _ttsVoices.length
      ? _ttsVoices
      : window.speechSynthesis.getVoices() || [];

    const zhVoice = voices.find(v => /zh[-_]?CN/i.test(v.lang))
                 || voices.find(v => /^zh/i.test(v.lang))
                 || voices.find(v => /chinese|mandarin/i.test(v.name));

    if(zhVoice || voices.length === 0){
      // Есть китайский голос ИЛИ голоса ещё не загружены — пробуем
      window.speechSynthesis.cancel();
      setTimeout(function(){
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'zh-CN';
        u.rate = 0.85;
        u.volume = 1.0;
        u.pitch = 1.0;
        if(zhVoice){
          u.voice = zhVoice;
          u.lang = zhVoice.lang; // важно для Яндекс!
        }
        window.speechSynthesis.speak(u);
      }, 100);
      return;
    }
  }

  // Метод 2: Google Translate TTS через аудио-тег
  _speakViaAudio(text);
}

function _speakViaAudio(text){
  try{
    const src = 'https://translate.google.com/translate_tts?ie=UTF-8&tl=zh-CN&client=tw-ob&q=' + encodeURIComponent(text);
    const a = new Audio();
    a.src = src;
    a.volume = 1.0;
    const p = a.play();
    if(p && typeof p.catch === 'function'){
      p.catch(function(){
        // Метод 3: показать текст пиньиня как подсказку
        _showPinyinHint(text);
      });
    }
  } catch(e){ _showPinyinHint(text); }
}

function _showPinyinHint(text){
  // Если озвучка не работает — показываем toast с подсказкой
  let toast = document.getElementById('tts-toast');
  if(!toast){
    toast = document.createElement('div');
    toast.id = 'tts-toast';
    toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 18px;border-radius:12px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90vw;text-align:center';
    document.body.appendChild(toast);
  }
  toast.textContent = '🔊 Озвучка: ' + text + ' — для звука нужен китайский голос в системе';
  toast.style.opacity = '1';
  clearTimeout(toast._timer);
  toast._timer = setTimeout(function(){ toast.style.opacity = '0'; }, 3000);
}

function applySRS(item, quality){
  let {srsInterval=1,srsEaseFactor=2.5,srsRepetitions=0}=item;
  if(quality===0){ srsRepetitions=0; srsInterval=1; }
  else{
    if(srsRepetitions===0) srsInterval=1;
    else if(srsRepetitions===1) srsInterval=3;
    else srsInterval=Math.round(srsInterval*srsEaseFactor);
    srsRepetitions+=1;
    srsEaseFactor=Math.max(1.3,srsEaseFactor+0.1-(3-quality)*(0.08+(3-quality)*0.02));
  }
  const srsDueDate=(()=>{const d=new Date();d.setDate(d.getDate()+srsInterval);return d.toISOString().slice(0,10);})();
  const status=quality===0?'новое':quality===1?'учу':'знаю';
  return {...item,srsInterval,srsEaseFactor,srsRepetitions,srsDueDate,status};
}

}

function addWord(){
  const hanzi=document.getElementById('nw-hanzi').value.trim();

  state.dictionary.unshift(normalizeDictionary([{
    hanzi, pinyin:document.getElementById('nw-pinyin').value.trim(),

    category:document.getElementById('nw-category').value.trim()||'Мои слова',

function removeWord(key){

}
function updateWordStatus(key,status){
  const t=parseKey(key);
  state.dictionary=state.dictionary.map(w=>w.hanzi===t.hanzi&&w.translation===t.translation?{...w,status}:w);

}

function toggleAnswer(){ state.showAnswer=!state.showAnswer; renderReview(); }
function srsAnswer(quality){
  const arr=wordsForReview();
  if(!arr.length) return;
  const w=arr[state.flashIndex%arr.length];
  const updated=applySRS(w,quality);
  state.dictionary=state.dictionary.map(item=>item.hanzi===w.hanzi&&item.translation===w.translation?updated:item);
  persist(); state.showAnswer=false;
  const remaining=wordsForReview();
  state.flashIndex=remaining.length===0?0:state.flashIndex%Math.max(1,remaining.length);
  renderReview(); renderDashboard();
}

// ── Quiz ───────────────────────────────────────────────────────
function shuffle(arr){ return [...arr].sort(()=>Math.random()-.5); }
function quizCategories(){ return ['все',...Array.from(new Set(state.dictionary.map(x=>x.category)))]; }
function quizPool(){
  const cat=state.quiz.categoryFilter;
  return (cat==='все'?state.dictionary:state.dictionary.filter(w=>w.category===cat)).filter(w=>w.hanzi&&w.translation);
}
function generateQuizQuestion(){
  const pool=quizPool();
  if(pool.length<4){ state.quiz.current=null; state.quiz.options=[]; return; }
  const correct=pool[Math.floor(Math.random()*pool.length)];
  const wrong=shuffle(pool.filter(w=>w.hanzi!==correct.hanzi)).slice(0,3);
  state.quiz.current=correct;
  state.quiz.options=shuffle([correct,...wrong]);
  state.quiz.answered=null;
}
function quizAnswer(hanzi){
  if(state.quiz.answered!==null) return;
  state.quiz.answered=hanzi;
  state.quiz.total++;
  if(hanzi===state.quiz.current.hanzi) state.quiz.score++;
  renderQuiz();
}
function quizNext(){ generateQuizQuestion(); renderQuiz(); }
function setQuizCategory(v){ state.quiz.categoryFilter=v; state.quiz.score=0; state.quiz.total=0; generateQuizQuestion(); renderQuiz(); }
function setQuizMode(v){ state.quiz.mode=v; state.quiz.score=0; state.quiz.total=0; generateQuizQuestion(); renderQuiz(); }

function renderQuiz(){
  const q=state.quiz;
  const pool=quizPool();
  const acc=q.total>0?Math.round((q.score/q.total)*100):0;
  if(!q.current) generateQuizQuestion();
  const w=q.current;
  const showQ=q.mode==='translation'?`<div style="text-align:center"><div class="hanzi-large" style="cursor:pointer" onclick="speakChinese('${w?esc(w.hanzi):''}')">${w?esc(w.hanzi):''}</div><div class="pinyin" style="margin-top:6px;font-size:18px">${w?esc(w.pinyin):''}</div></div>`:
    `<div style="text-align:center;font-size:20px;font-weight:800">${w?esc(w.translation):''}</div>`;

  document.getElementById('quiz').innerHTML=`
    <div class="grid-2" style="grid-template-columns:1.3fr 1fr">

        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:14px">

          <select onchange="setQuizCategory(this.value)" style="flex:1;min-width:140px">
            ${quizCategories().map(c=>`<option value="${esc(c)}" ${q.categoryFilter===c?'selected':''}>${c==='все'?'Все категории':esc(c)}</option>`).join('')}
          </select>
          <div style="display:flex;gap:4px">
            <button class="btn ${q.mode==='translation'?'':'secondary'} small" onclick="setQuizMode('translation')">汉字→RU</button>
            <button class="btn ${q.mode==='word'?'':'secondary'} small" onclick="setQuizMode('word')">RU→汉字</button>
          </div>
        </div>
        ${pool.length<4?`<div class="notice">Мало слов в категории. Выбери другую или добавь слова.</div>`:
        !w?'':`
          <div style="padding:24px 16px;background:var(--bg);border-radius:var(--radius-sm);margin-bottom:14px;border:1px solid var(--line)">
            <div class="small-muted" style="text-align:center;margin-bottom:10px">${q.mode==='translation'?'Что означает этот иероглиф?':'Выбери правильный иероглиф:'}</div>
            ${showQ}
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            ${q.options.map(opt=>{
              const isCorrect=opt.hanzi===w.hanzi;
              const isAnswered=q.answered===opt.hanzi;
              let style='';
              let extra='';
              if(q.answered!==null){
                if(isCorrect){style='background:var(--green-soft);border-color:var(--green);border-width:2px';extra='✓ ';}
                else if(isAnswered){style='background:#fef2f2;border-color:#dc2626;border-width:2px';extra='✗ ';}
              }
              const label=q.mode==='translation'?esc(opt.translation.split(';')[0].trim()):`<span style="font-size:18px;font-weight:900">${esc(opt.hanzi)}</span> <span style="font-size:12px;color:var(--muted)">${esc(opt.pinyin)}</span>`;
              return `<button onclick="quizAnswer('${esc(opt.hanzi)}')" style="padding:14px 10px;border-radius:var(--radius-sm);border:1.5px solid var(--line);background:var(--card);color:var(--text);cursor:pointer;font:inherit;font-size:14px;font-weight:600;text-align:center;transition:all .15s;${style}">${extra}${label}</button>`;
            }).join('')}
          </div>
          ${q.answered!==null?`<div style="margin-top:14px">
            <div style="padding:12px 14px;border-radius:var(--radius-sm);font-weight:700;${q.answered===w.hanzi?'background:var(--green-soft);color:var(--green);border:1px solid #a7f3d0':'background:#fef2f2;color:#dc2626;border:1px solid #fecaca'}">
              ${q.answered===w.hanzi?'✓ Правильно!':'✗ Правильный ответ: '+esc(w.hanzi)+' — '+esc(w.translation)}
            </div>
            ${w.example?`<div class="item-card" style="margin-top:10px;font-size:13px"><div style="font-weight:700">${esc(w.example)}</div>${w.examplePinyin?`<div class="pinyin-sm" style="margin-top:4px">${esc(w.examplePinyin)}</div>`:''}<button class="btn secondary small" style="margin-top:8px" onclick="speakChinese(${safeJson(w.example)})">🔊</button></div>`:''}
            <div class="button-row" style="margin-top:10px"><button class="btn" onclick="quizNext()">Следующий →</button></div>
          </div>`:''}`}
      </div>
      <div class="card">
        <div class="section-title">Статистика</div>

              <div style="text-align:center;padding:12px;background:#fef2f2;border-radius:var(--radius-sm)"><div style="font-size:26px;font-weight:900;color:#dc2626">${q.total-q.score}</div><div class="small-muted">Ошибки</div></div>
            </div>
            <div style="margin-top:10px"><div class="progress"><div class="bar" style="width:${acc}%"></div></div></div>
          </div>
          <div class="item-card"><strong>汉字→RU</strong><div class="small-muted" style="margin-top:4px">Видишь иероглиф — выбираешь перевод</div></div>
          <div class="item-card"><strong>RU→汉字</strong><div class="small-muted" style="margin-top:4px">Видишь перевод — выбираешь иероглиф и пиньинь</div></div>
          <div class="item-card"><button class="btn secondary small" onclick="(()=>{state.quiz.score=0;state.quiz.total=0;generateQuizQuestion();renderQuiz();})()">Сбросить счёт</button></div>
        </div>
      </div>
    </div>`;
}

              <div>
                <div class="section-title">${esc(text.title)}</div>
                <span style="background:${text.level==='HSK 1'?'#eff6ff':'#f0fdf4'};color:${text.level==='HSK 1'?'#2563eb':'#16a34a'};padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700">${text.level}</span>
              </div>
              <button class="btn secondary small" onclick="speakChinese(${safeJson(text.text)})">🔊 Озвучить</button>
            </div>

            <div style="font-size:20px;line-height:2;padding:20px;background:var(--bg);border-radius:var(--radius-sm);margin-bottom:14px;border:1px solid var(--line)">
              ${esc(text.text)}
            </div>

            <div style="margin-bottom:14px">
              <button class="btn secondary small" onclick="toggleReadingSection('pinyin')" style="margin-right:8px">
                ${(state.showReadingPinyin||{})[text.id]?'Скрыть пиньинь':'Показать пиньинь'}
              </button>
              <button class="btn secondary small" onclick="toggleReadingSection('translation')">
                ${(state.showReadingTranslation||{})[text.id]?'Скрыть перевод':'Показать перевод'}
              </button>
            </div>

            ${(state.showReadingPinyin||{})[text.id]?`
              <div style="font-size:14px;line-height:1.9;padding:14px;background:var(--gold-soft);border-radius:var(--radius-sm);margin-bottom:10px;color:var(--gold-text);border:1px solid #fcd34d">
                ${esc(text.pinyin)}
              </div>`:``}

            ${(state.showReadingTranslation||{})[text.id]?`
              <div style="font-size:14px;line-height:1.75;padding:14px;background:var(--primary-soft);border-radius:var(--radius-sm);margin-bottom:10px;color:var(--primary-text);border:1px solid #fca5a5">
                ${esc(text.translation)}
              </div>`:``}

            <div>
              <div style="font-size:13px;font-weight:800;margin-bottom:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em">🔑 Ключевые слова</div>
              <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px">
                ${text.words.map(w=>`
                  <div style="padding:8px 12px;border:1px solid var(--line);border-radius:var(--radius-xs);font-size:13px;line-height:1.5">
                    <span style="font-weight:700;color:var(--primary)">${esc(w.split(' — ')[0])}</span>
                    <span style="color:var(--muted)"> — ${esc(w.split(' — ')[1]||'')}</span>
                  </div>`).join('')}
              </div>
            </div>
            <div class="notice" style="margin-top:14px">💡 Метод: сначала читай только иероглифы, пытаясь понять смысл. Потом открой пиньинь. Перевод — только для проверки.</div>
          </div>`}
      </div>
    </div>`;
}
function setActiveReading(id){
  state.activeReading = id;
  state.showReadingPinyin = {};
  state.showReadingTranslation = {};
  renderReading();
}
function toggleReadingSection(type){
  const id = state.activeReading;
  if(!id) return;
  if(type==='pinyin'){
    if(!state.showReadingPinyin) state.showReadingPinyin = {};
    state.showReadingPinyin[id] = !state.showReadingPinyin[id];
  } else {
    if(!state.showReadingTranslation) state.showReadingTranslation = {};
    state.showReadingTranslation[id] = !state.showReadingTranslation[id];
  }
  renderReading();
}

// ── Init ───────────────────────────────────────────────────────
function renderAll(){
  renderTabs();
  renderDashboard();
  renderTones();
  renderDictionary();
  renderReview();
  generateQuizQuestion();
  renderQuiz();
  renderGrammar();
  renderPhrases();
  renderMeasure();
  renderHanzi();
  renderRadicals();
  renderReading();
  const saved=localStorage.getItem('zh_theme')||'light';
  const btn=document.getElementById('theme-btn');
  if(btn) btn.textContent=saved==='dark'?'☀️ Светлая':'🌙 Тёмная';
}
// voices init handled above
renderAll();
</script>
</body>
</html>
